    <script>
        // Get video link from URL parameter
        function getVideoLink() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('video') || '#';
        }

        // Open the video link
        function openVideoLink() {
            const videoUrl = getVideoLink();
            if (videoUrl && videoUrl !== '#') {
                window.open(videoUrl, '_blank');
            } else {
                alert('No se ha configurado un enlace de video para esta página.');
            }
        }

        // Update button text if needed (optional)
        window.addEventListener('DOMContentLoaded', function () {
            const videoUrl = getVideoLink();
            if (!videoUrl || videoUrl === '#') {
                document.getElementById('videoButton').style.opacity = '0.6';
            }
        });
    </script>
