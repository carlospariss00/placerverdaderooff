<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Placerverdadero - Enlaces románticos y contenido especial para San Valentín">
    <title>Placerverdadero</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="theme-valentine">
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>💕 Placerverdadero 💕</h1>
            <p>Enlaces románticos y mucho más para este 14 de febrero</p>
        </header>

        <!-- Links List -->
        <div class="links-list">
            <h2 class="text-center mb-lg">Enlaces Disponibles</h2>
            <!-- La lista se genera dinámicamente desde `links.js` -->
            <ol class="numbered-links">
                <!-- links.js insertará <li> -->
            </ol>
        </div>
        
        <!-- Accessibility Toggle -->
        <div class="accessibility-controls" style="text-align: center; margin: var(--spacing-lg) 0;">
            <button id="toggle-hearts" class="btn btn-primary" style="font-size: 0.9rem;">
                💝 Toggle Corazones
            </button>
        </div>
    </div>

    <script>
        // Function to open secondary page in a new window with video URL parameter
        function openSecondaryPage(videoUrl) {
            const encodedUrl = encodeURIComponent(videoUrl);
            window.open(`secondary.html?video=${encodedUrl}`, '_blank', 'width=1000,height=800,noopener,noreferrer');
        }
        
        // Toggle hearts effect for accessibility
        document.addEventListener('DOMContentLoaded', function() {
            const toggleBtn = document.getElementById('toggle-hearts');
            if (toggleBtn && window.heartsEffect) {
                toggleBtn.addEventListener('click', function() {
                    window.heartsEffect.toggle();
                    this.textContent = window.heartsEffect ? '💝 Toggle Corazones' : '💔 Corazones Desactivados';
                });
            }
        });
    </script>
    <script src="links.js" defer></script>
    <script src="hearts.js" defer></script>
</body>

</html>
